name: SkillKit
options:
  bundleIdPrefix: alice.turcanu.com
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release
  LocalRelease: release

packages:
  Highlightr:
    url: https://github.com/raspu/Highlightr
    from: "2.2.1"
  cmark-gfm:
    url: https://github.com/brokenhandsio/cmark-gfm.git
    from: "2.1.0"

targets:
  SkillKit:
    type: application
    platform: macOS
    sources:
      - path: SkillKit
        excludes:
          - "*.entitlements"
          - Info.plist
    dependencies:
      - package: Highlightr
      - package: cmark-gfm
        product: cmark
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: alice.turcanu.com.SkillKit
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: SkillKit/Info.plist
        CODE_SIGN_ENTITLEMENTS: SkillKit/SkillKit.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_STRICT_CONCURRENCY: minimal
        ASSETCATALOG_COMPILER_APPICON_NAME: SkillKitIcon
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
        LocalRelease:
          CODE_SIGN_ENTITLEMENTS: SkillKit/SkillKitLocalRelease.entitlements
